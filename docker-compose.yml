services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: trading_mvp
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: trading
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: infra/backend.Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://trading:trading@postgres:5432/trading_mvp
      REDIS_URL: redis://redis:6379/0
      LIVE_TRADING_ENABLED: "false"
      TRACKED_SYMBOLS: BTCUSDT,ETHUSDT,SOLUSDT
      MANUAL_LIVE_APPROVAL: "false"
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    command: >
      sh -c "alembic upgrade head &&
      python -m trading_mvp.cli seed &&
      uvicorn trading_mvp.main:app --app-dir backend --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: .
      dockerfile: infra/worker.Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://trading:trading@postgres:5432/trading_mvp
      REDIS_URL: redis://redis:6379/0
    command: python workers/worker.py
    depends_on:
      - backend
      - redis

  scheduler:
    build:
      context: .
      dockerfile: infra/worker.Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://trading:trading@postgres:5432/trading_mvp
      REDIS_URL: redis://redis:6379/0
    command: python workers/scheduler.py
    depends_on:
      - backend
      - redis

  frontend:
    build:
      context: .
      dockerfile: infra/frontend.Dockerfile
    environment:
      API_BASE_URL: http://backend:8000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres-data:
