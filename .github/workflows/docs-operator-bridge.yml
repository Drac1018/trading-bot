name: docs-operator-bridge

on:
  pull_request:
    paths:
      - "docs/*.md"
      - "docs/**/*.md"
      - "scripts/check_operator_bridge_docs.py"
      - ".github/workflows/docs-operator-bridge.yml"
  push:
    paths:
      - "docs/*.md"
      - "docs/**/*.md"
      - "scripts/check_operator_bridge_docs.py"
      - ".github/workflows/docs-operator-bridge.yml"
  workflow_dispatch:

jobs:
  check-operator-bridge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check operator bridge docs
        run: python scripts/check_operator_bridge_docs.py
